<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Font & Color Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="auth-container">
        <button id="auth-login-btn" class="auth-login-btn">
            <img src="ikn/icon.svg" alt="Login" class="auth-icon">
            <span>Войти</span>
        </button>
        <div id="clerk-user-button"></div>
    </div>

    <div class="slider-container">
        
        <div class="beta-text">Бета-тест, возможны баги</div>

        <div class="input-box">
            <input type="text" id="textInput" class="custom-input" placeholder="Введите свой текст...">
        </div>

        <div class="control-box">
            <span class="control-label">Размер</span>
            <input type="range" id="sizeSlider" class="range-slider" min="16" max="100" value="48">
            <span class="control-label" id="sizeLabel" style="min-width:35px; text-align:right;">48px</span>
        </div>

        <div class="search-panel" id="searchPanel">
            <input type="text" id="fontSearchInput" class="custom-input" placeholder="Название шрифта...">
            <div class="search-results" id="searchResults"></div>
        </div>

        <div class="menu-wrapper" id="menuWrapper">
            <div class="menu-grid" id="menuGrid">
                <button class="menu-tile" data-target="color-settings">
                    <img src="ikn/color.svg" alt="Цвет">
                    <span>Цвет</span>
                </button>
                <button class="menu-tile" data-target="weight-settings">
                    <img src="ikn/weight.svg" alt="Жирность">
                    <span>Жирность</span>
                </button>
                <button class="menu-tile" data-target="spacing-settings">
                    <img src="ikn/intervals.svg" alt="Интервалы">
                    <span>Интервалы</span>
                </button>
            </div>

            <div class="sub-panel" id="color-settings">
                <button class="back-btn"><img src="ikn/back.svg" alt="Назад"> </button>
                <div class="control-box">
                    <span class="control-label">Цвет</span>
                    <input type="range" id="colorSlider" class="range-slider" min="0" max="360" value="0">
                    <span class="control-label" style="min-width:20px; text-align:right;"><span class="color-indicator" id="indicator"></span></span>
                </div>
                <div class="control-box">
                    <span class="control-label">Яркость</span>
                    <input type="range" id="brightnessSlider" class="range-slider" min="0" max="100" value="100">
                    <span class="control-label" id="brightLabel" style="min-width:35px; text-align:right;">100%</span>
                </div>
            </div>

            <div class="sub-panel" id="weight-settings">
                <button class="back-btn"><img src="ikn/back.svg" alt="Назад"></button>
                <div class="control-box" id="weightBox">
                    <span class="control-label">Жирность</span>
                    <input type="range" id="weightSlider" class="range-slider" min="100" max="900" step="1" value="400">
                    <span class="control-label" id="weightLabel" style="min-width:35px; text-align:right;">400</span>
                </div>
            </div>

            <div class="sub-panel" id="spacing-settings">
                <button class="back-btn"><img src="ikn/back.svg" alt="Назад"></button>
                <div class="control-box" id="spacingBox">
                    <span class="control-label" style="font-size: 11px;">Межбуквенный</span>
                    <input type="range" id="spacingSlider" class="range-slider" min="-10" max="50" step="1" value="0">
                    <span class="control-label" id="spacingLabel" style="min-width:35px; text-align:right;">0px</span>
                </div>
                <div class="control-box" id="lineHeightBox">
                    <span class="control-label" style="font-size: 11px;">Межстрочный</span>
                    <input type="range" id="lineHeightSlider" class="range-slider" min="0.1" max="3.5" step="0.1" value="1.3">
                    <span class="control-label" id="lineHeightLabel" style="min-width:35px; text-align:right;">1.3</span>
                </div>
            </div>
        </div>

        <div class="slider-wrapper">
            <div class="font-card">
                <div class="font-preview" id="fontPreview">Aa</div>
                <div class="font-name" id="fontName">21063.otf</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="left-tools">
                <button class="align-btn" data-align="left" id="alignLeft">
                    <img src="ikn/align-left.svg" alt="По левому краю">
                </button>
                <button class="align-btn active" data-align="center" id="alignCenter">
                    <img src="ikn/align-center.svg" alt="По центру">
                </button>
                <button class="align-btn" data-align="right" id="alignRight">
                    <img src="ikn/align-right.svg" alt="По правому краю">
                </button>
                
                <button class="menu-btn" id="menuToggleBtn">
                    <img src="ikn/menu.svg" alt="Menu">
                </button>

                <button class="search-btn" id="searchBtn">
                    <img src="ikn/search.svg" alt="Search">
                </button>
            </div>

            <div class="nav-group">
                <button class="nav-btn" id="prevBtn">&#10094;</button>
                <button class="nav-btn" id="nextBtn">&#10095;</button>
            </div>
        </div>

        <button class="action-btn" id="applyBtn">Создать</button>
    </div>

    <div class="bottom-branding-panel">
        <div class="brand-badge">
            <img src="podp.svg" alt="Icon">
        </div>
        
        <div class="brand-divider"></div>
        
        <a href="https://github.com/Gerther" target="_blank" class="github-link-btn" title="Открыть GitHub">
            <img src="ikn/github.svg" alt="GitHub">
        </a>
    </div>

    <div id="downloadModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 9, 20, 0.95); z-index: 10000; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 24px; border-radius: 24px; max-width: 340px; width: 100%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
            <h3 style="margin-bottom: 12px; font-size: 18px; font-weight: 600;">Готово!</h3>
            <p style="font-size: 14px; color: #8a8a9e; margin-bottom: 20px;">Нажмите кнопку ниже, чтобы сохранить прозрачный PNG в х5 качестве.</p>
            <a id="confirmDownloadBtn" href="#" download="text_preview.png" style="display: block; width: 100%; padding: 14px; background: #ffffff; color: #0b0914; border-radius: 14px; text-decoration: none; font-weight: 600; font-size: 15px; margin-bottom: 10px; transition: background 0.2s;">Скачать PNG</a>
            <button id="closeModalBtn" style="width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #ffffff; border-radius: 14px; font-size: 14px; cursor: pointer;">Закрыть</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
